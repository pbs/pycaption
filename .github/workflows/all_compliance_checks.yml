name: All Compliance Checks

on:
  workflow_dispatch:
    inputs:
      notify_slack:
        description: 'Send Slack notification'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  all-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run all compliance checks
        id: compliance
        run: |
          echo "=========================================="
          echo "  RUNNING ALL COMPLIANCE CHECKS"
          echo "=========================================="

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          echo ""
          echo "[1/4] SCC Compliance Check"
          echo "-------------------------------------------"
          sed -n '/^```python/,/^```/{ /^```/d; p; }' .claude/skills/check-scc-compliance/skill.md > "$TMPDIR/scc.py"
          python3 "$TMPDIR/scc.py" && SCC_EXIT=0 || SCC_EXIT=$?

          echo ""
          echo "[2/4] VTT Compliance Check"
          echo "-------------------------------------------"
          sed -n '/^```python/,/^```/{ /^```/d; p; }' .claude/skills/check-vtt-compliance/skill.md > "$TMPDIR/vtt.py"
          python3 "$TMPDIR/vtt.py" && VTT_EXIT=0 || VTT_EXIT=$?

          echo ""
          echo "[3/4] DFXP Compliance Check"
          echo "-------------------------------------------"
          sed -n '/^```python/,/^```/{ /^```/d; p; }' .claude/skills/check-dfxp-compliance/skill.md > "$TMPDIR/dfxp.py"
          python3 "$TMPDIR/dfxp.py" && DFXP_EXIT=0 || DFXP_EXIT=$?

          echo ""
          echo "[4/4] SAMI Compliance Check"
          echo "-------------------------------------------"
          sed -n '/^```python/,/^```/{ /^```/d; p; }' .claude/skills/check-sami-compliance/skill.md > "$TMPDIR/sami.py"
          python3 "$TMPDIR/sami.py" && SAMI_EXIT=0 || SAMI_EXIT=$?

          echo ""
          echo "=========================================="
          echo "  ALL COMPLIANCE CHECKS COMPLETE"
          echo "=========================================="

          SCC_STATUS=$([ $SCC_EXIT -eq 0 ] && echo 'OK' || echo 'FAILED')
          VTT_STATUS=$([ $VTT_EXIT -eq 0 ] && echo 'OK' || echo 'FAILED')
          DFXP_STATUS=$([ $DFXP_EXIT -eq 0 ] && echo 'OK' || echo 'FAILED')
          SAMI_STATUS=$([ $SAMI_EXIT -eq 0 ] && echo 'OK' || echo 'FAILED')

          echo "  SCC:  $SCC_STATUS"
          echo "  VTT:  $VTT_STATUS"
          echo "  DFXP: $DFXP_STATUS"
          echo "  SAMI: $SAMI_STATUS"

          SCC_REPORT=$(ls -t ai_artifacts/compliance_checks/scc/compliance_report_*.md 2>/dev/null | head -1)
          VTT_REPORT=$(ls -t ai_artifacts/compliance_checks/vtt/compliance_report_*.md 2>/dev/null | head -1)
          DFXP_REPORT=$(ls -t ai_artifacts/compliance_checks/dfxp/compliance_report_*.md 2>/dev/null | head -1)
          SAMI_REPORT=$(ls -t ai_artifacts/compliance_checks/sami/compliance_report_*.md 2>/dev/null | head -1)

          # Extract issue counts from reports
          SCC_ISSUES=$(grep -oE 'Total issues\*\*: [0-9]+' "$SCC_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")
          SCC_MUST=$(grep -oE 'MUST violations\*\*: [0-9]+' "$SCC_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")
          VTT_ISSUES=$(grep -oE 'Total issues\*\*: [0-9]+' "$VTT_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")
          VTT_MUST=$(grep -oE 'MUST violations\*\*: [0-9]+' "$VTT_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")
          DFXP_ISSUES=$(grep -oE 'Total issues\*\*: [0-9]+' "$DFXP_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")
          DFXP_MUST=$(grep -oE 'MUST violations\*\*: [0-9]+' "$DFXP_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")
          SAMI_ISSUES=$(grep -oE 'Total issues\*\*: [0-9]+' "$SAMI_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")
          SAMI_MUST=$(grep -oE 'MUST violations\*\*: [0-9]+' "$SAMI_REPORT" 2>/dev/null | grep -oE '[0-9]+' || echo "unknown")

          # Write summary for later steps
          {
            echo "SCC_STATUS=$SCC_STATUS"
            echo "VTT_STATUS=$VTT_STATUS"
            echo "DFXP_STATUS=$DFXP_STATUS"
            echo "SAMI_STATUS=$SAMI_STATUS"
            echo "SCC_ISSUES=$SCC_ISSUES"
            echo "SCC_MUST=$SCC_MUST"
            echo "VTT_ISSUES=$VTT_ISSUES"
            echo "VTT_MUST=$VTT_MUST"
            echo "DFXP_ISSUES=$DFXP_ISSUES"
            echo "DFXP_MUST=$DFXP_MUST"
            echo "SAMI_ISSUES=$SAMI_ISSUES"
            echo "SAMI_MUST=$SAMI_MUST"
          } >> $GITHUB_ENV

          # Fail if any check crashed
          if [ $SCC_EXIT -ne 0 ] || [ $VTT_EXIT -ne 0 ] || [ $DFXP_EXIT -ne 0 ] || [ $SAMI_EXIT -ne 0 ]; then
            echo "ANY_FAILED=true" >> $GITHUB_ENV
          else
            echo "ANY_FAILED=false" >> $GITHUB_ENV
          fi
        continue-on-error: true

      - name: Upload all compliance reports
        uses: actions/upload-artifact@v7
        with:
          name: all-compliance-reports
          path: ai_artifacts/compliance_checks/
          retention-days: 90

      - name: Write job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## All Compliance Checks

          | Format | Status | Issues | MUST |
          |--------|--------|--------|------|
          EOF
          echo "| SCC | $SCC_STATUS | $SCC_ISSUES | $SCC_MUST |" >> $GITHUB_STEP_SUMMARY
          echo "| VTT | $VTT_STATUS | $VTT_ISSUES | $VTT_MUST |" >> $GITHUB_STEP_SUMMARY
          echo "| DFXP | $DFXP_STATUS | $DFXP_ISSUES | $DFXP_MUST |" >> $GITHUB_STEP_SUMMARY
          echo "| SAMI | $SAMI_STATUS | $SAMI_ISSUES | $SAMI_MUST |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download reports from the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Check Slack token availability
        id: slack_check
        run: |
          if [ -n "$SLACK_TOKEN" ] && [ -n "$SLACK_CHANNEL" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}

      - name: Notify Slack
        if: github.event.inputs.notify_slack == 'true' && steps.slack_check.outputs.available == 'true'
        uses: archive/github-actions-slack@433fef9978d3adae73168bfc9c5a7ce722780231 # v3.1.0
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-text: |
            :memo: *All Compliance Checks Complete*

            | Format | Status | Issues | MUST |
            |--------|--------|--------|------|
            | SCC | ${{ env.SCC_STATUS }} | ${{ env.SCC_ISSUES }} | ${{ env.SCC_MUST }} |
            | VTT | ${{ env.VTT_STATUS }} | ${{ env.VTT_ISSUES }} | ${{ env.VTT_MUST }} |
            | DFXP | ${{ env.DFXP_STATUS }} | ${{ env.DFXP_ISSUES }} | ${{ env.DFXP_MUST }} |
            | SAMI | ${{ env.SAMI_STATUS }} | ${{ env.SAMI_ISSUES }} | ${{ env.SAMI_MUST }} |

            <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Download reports>

      - name: Fail job on script crash
        if: env.ANY_FAILED == 'true'
        run: |
          echo "::error::One or more compliance checks failed"
          exit 1
